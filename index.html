<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I Love You WIDYAAAAA</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #fff0f3;
      font-family: Georgia, serif;
    }

    .heart {
      width: 100px;
      height: 90px;
      position: relative;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      top: 0;
      width: 52px;
      height: 80px;
      background: #e8314a;
      border-radius: 52px 52px 0 0;
    }

    .heart::before {
      left: 50px;
      transform: rotate(-45deg);
      transform-origin: 0 100%;
    }

    .heart::after {
      left: 0;
      transform: rotate(45deg);
      transform-origin: 100% 100%;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      14%  { transform: scale(1.2); }
      28%  { transform: scale(1); }
      42%  { transform: scale(1.15); }
      70%  { transform: scale(1); }
      100% { transform: scale(1); }
    }

    .caption {
      margin-top: 32px;
      font-size: 1.6rem;
      color: #e8314a;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="heart"></div>
  <p class="caption">I love you <strong>WIDYA</strong> My <em>Wifey<em></p>
</body>
</html>
